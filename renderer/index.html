<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sakura Memo</title>
<style>
  :root {
    --sakura: #F472B6;
    --sakura-dark: #BE185D;
    --sakura-bg: #FEF1F5;
    --glass-border: rgba(244, 114, 182, 0.15);
    --text-primary: #1a1a2e;
    --text-secondary: #6b7280;
    --text-tertiary: #9ca3af;
    --radius: 14px;
    --radius-sm: 10px;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    width: 100%; height: 100%;
    background: linear-gradient(135deg, #FDF2F8 0%, #FFF5F9 50%, #FEF2F2 100%);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
  }
  .app {
    width: 100%; height: 100%;
    display: flex; flex-direction: column;
    max-width: 960px; margin: 0 auto;
  }
  .header {
    display: flex; align-items: center;
    padding: 20px 24px 12px;
    gap: 12px;
  }
  .header .logo {
    font-size: 20px; font-weight: 700;
    color: var(--sakura); letter-spacing: 0.5px;
  }
  .header .spacer { flex: 1; }
  .header .btn-new {
    padding: 8px 20px;
    background: var(--sakura);
    color: white; border: none;
    border-radius: 20px;
    cursor: pointer; font-size: 13px;
    font-weight: 500;
    transition: all 0.2s;
    box-shadow: 0 2px 8px rgba(244, 114, 182, 0.3);
  }
  .header .btn-new:hover {
    transform: translateY(-1px);
    box-shadow: 0 4px 16px rgba(244, 114, 182, 0.4);
  }
  .search-bar { padding: 0 24px 16px; }
  .search-input {
    width: 100%; padding: 10px 16px;
    border: 1px solid var(--glass-border);
    border-radius: 12px; font-size: 13px;
    outline: none; background: rgba(255,255,255,0.7);
    color: var(--text-primary);
    backdrop-filter: blur(10px);
  }
  .search-input:focus { border-color: var(--sakura); }
  .search-input::placeholder { color: var(--text-tertiary); }
  .stats {
    display: flex; gap: 12px;
    padding: 0 24px 16px;
  }
  .stat-card {
    flex: 1; padding: 12px;
    background: rgba(255,255,255,0.6);
    backdrop-filter: blur(10px);
    border-radius: var(--radius-sm);
    border: 1px solid var(--glass-border);
    text-align: center;
  }
  .stat-card .num { font-size: 24px; font-weight: 700; color: var(--sakura); }
  .stat-card .label { font-size: 11px; color: var(--text-secondary); margin-top: 2px; }
  .note-list {
    flex: 1; overflow-y: auto;
    padding: 0 24px 24px;
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
    gap: 12px; align-content: start;
  }
  .note-card {
    background: rgba(255,255,255,0.65);
    backdrop-filter: blur(12px);
    border: 1px solid var(--glass-border);
    border-radius: var(--radius); padding: 14px;
    cursor: pointer; transition: all 0.2s;
    display: flex; flex-direction: column;
    gap: 8px; min-height: 110px; position: relative;
  }
  .note-card:hover {
    border-color: var(--sakura);
    transform: translateY(-2px);
    box-shadow: 0 4px 20px rgba(244,114,182,0.1);
  }
  .note-card .card-title {
    font-size: 13px; font-weight: 600;
    color: var(--text-primary);
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .note-card .card-content {
    font-size: 12px; color: var(--text-secondary);
    line-height: 1.5; flex: 1;
    overflow: hidden;
    display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical;
  }
  .note-card .card-meta {
    display: flex; justify-content: space-between;
    font-size: 10px; color: var(--text-tertiary);
  }
  .note-card .card-star {
    position: absolute; top: 6px; left: 8px;
    width: 26px; height: 26px; border: none;
    background: transparent; border-radius: 6px;
    cursor: pointer; padding: 2px;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.15s;
  }
  .note-card .card-star:hover { background: rgba(244,114,182,0.1); }
  .note-card .card-star img { width: 18px; height: 18px; opacity: 0.2; transition: all 0.2s; }
  .note-card .card-star.pinned img { opacity: 1; }
  .note-card .card-delete {
    position: absolute; top: 8px; right: 10px;
    width: 24px; height: 24px; border: none;
    background: transparent; border-radius: 6px;
    font-size: 12px; color: var(--text-tertiary);
    cursor: pointer; display: none;
    align-items: center; justify-content: center;
  }
  .note-card:hover .card-delete { display: flex; }
  .note-card .card-delete:hover { background: #fecaca; color: #ef4444; }
  .empty {
    grid-column: 1 / -1; text-align: center;
    padding: 60px 20px; color: var(--text-tertiary);
  }
  .empty .icon { font-size: 48px; margin-bottom: 12px; }
  .empty .text { font-size: 13px; }
  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-thumb { background: rgba(244,114,182,0.15); border-radius: 2px; }
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <span class="logo">Sakura Memo</span>
    <div class="spacer"></div>
    <button class="btn-new" id="btnNew">+ 新建便签</button>
  </div>
  <div class="search-bar">
    <input class="search-input" id="searchInput" placeholder="搜索便签...">
  </div>
  <div class="stats">
    <div class="stat-card"><div class="num" id="statTotal">0</div><div class="label">全部</div></div>
    <div class="stat-card"><div class="num" id="statPinned">0</div><div class="label">已收藏</div></div>
    <div class="stat-card"><div class="num" id="statToday">0</div><div class="label">今日更新</div></div>
  </div>
  <div class="note-list" id="noteList">
    <div class="empty"><div class="icon">🌸</div><div class="text">还没有便签，点击上方按钮创建</div></div>
  </div>
</div>

<script src="app.js"></script>
<script>
let allNotes = [];

async function loadNotes(query = "") {
  allNotes = query ? await sakura.searchNotes(query) : await sakura.getAllNotes();
  renderNotes(allNotes);
  updateStats(allNotes);
}

function renderNotes(notes) {
  const list = document.getElementById("noteList");
  if (!notes.length) {
    list.innerHTML = '<div class="empty"><div class="icon">🌸</div><div class="text">没有找到便签</div></div>';
    return;
  }
  list.innerHTML = notes.map(n => `
    <div class="note-card" data-id="${n.id}">
      <button class="card-star${n.pinned ? ' pinned' : ''}" data-id="${n.id}" title="收藏">
        <img src="/assets/bookmark.png" alt="收藏">
      </button>
      <div class="card-title">${esc(n.title || '无标题')}</div>
      <div class="card-content">${esc(n.content || '空内容')}</div>
      <div class="card-meta">
        <span>${fmt(n.updated_at)}</span>
      </div>
      <button class="card-delete" data-id="${n.id}">✕</button>
    </div>
  `).join("");

  list.querySelectorAll(".note-card").forEach(card => {
    card.addEventListener("click", (e) => {
      if (e.target.closest(".card-delete") || e.target.closest(".card-star")) return;
      sakura.openNote(Number(card.dataset.id));
    });
  });
  list.querySelectorAll(".card-star").forEach(btn => {
    btn.addEventListener("click", async (e) => {
      e.stopPropagation();
      const id = Number(btn.dataset.id);
      const note = allNotes.find(n => n.id === id);
      if (!note) return;
      const newPinned = note.pinned ? 0 : 1;
      await sakura.updateNote(id, { pinned: newPinned });
      note.pinned = newPinned;
      btn.classList.toggle("pinned", newPinned);
      updateStats(allNotes);
    });
  });
  list.querySelectorAll(".card-delete").forEach(btn => {
    btn.addEventListener("click", async (e) => {
      e.stopPropagation();
      if (confirm("确定删除？")) {
        await sakura.deleteNote(Number(btn.dataset.id));
        loadNotes(document.getElementById("searchInput").value);
      }
    });
  });
}

function updateStats(notes) {
  const today = new Date().toISOString().split("T")[0];
  document.getElementById("statTotal").textContent = notes.length;
  document.getElementById("statPinned").textContent = notes.filter(n => n.pinned).length;
  document.getElementById("statToday").textContent = notes.filter(n => n.updated_at && n.updated_at.startsWith(today)).length;
}

function fmt(d) {
  if (!d) return "";
  try {
    const dt = new Date(d.replace(" ","T"));
    const diff = Date.now() - dt;
    if (diff < 6e4) return "刚刚";
    if (diff < 36e5) return Math.floor(diff/6e4) + "分钟前";
    if (diff < 864e5) return Math.floor(diff/36e5) + "小时前";
    return d.split(" ")[0];
  } catch { return d; }
}
function esc(s) { const el = document.createElement("div"); el.textContent = s; return el.innerHTML; }

let st;
document.getElementById("searchInput").addEventListener("input", (e) => {
  clearTimeout(st); st = setTimeout(() => loadNotes(e.target.value), 300);
});
document.getElementById("btnNew").addEventListener("click", async () => {
  const { id } = await sakura.createNote({});
  sakura.openNote(id);
  loadNotes();
});
loadNotes();
</script>
</body>
</html>
