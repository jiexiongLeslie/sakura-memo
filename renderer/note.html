<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sakura Memo</title>
<style>
  :root {
    --sakura: #F472B6;
    --sakura-dark: #BE185D;
    --sakura-light: #FDF2F8;
    --sakura-bg: #FEF1F5;
    --glass-bg: rgba(255, 255, 255, 0.45);
    --glass-border: rgba(244, 114, 182, 0.25);
    --glass-blur: blur(20px);
    --text-primary: #1a1a2e;
    --text-secondary: #6b7280;
    --radius: 16px;
    --radius-sm: 8px;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    width: 100%; height: 100%;
    overflow: hidden;
    background: transparent;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
    user-select: none;
    border-radius: var(--radius);
  }

  .note-container {
    width: 100%; height: 100%;
    background: var(--glass-bg);
    backdrop-filter: var(--glass-blur);
    -webkit-backdrop-filter: var(--glass-blur);
    border: 1px solid var(--glass-border);
    border-radius: var(--radius);
    display: flex;
    flex-direction: column;
    overflow: hidden;
    transition: box-shadow 0.3s;
  }

  .note-container:hover {
    box-shadow: 0 0 30px rgba(244, 114, 182, 0.12);
  }

  /* Title bar */
  .titlebar {
    display: flex;
    align-items: center;
    padding: 8px 12px;
    background: rgba(244, 114, 182, 0.08);
    border-bottom: 1px solid var(--glass-border);
    -webkit-app-region: drag;
    min-height: 40px;
    gap: 6px;
  }

  .titlebar .mode-badge {
    font-size: 11px;
    padding: 2px 8px;
    border-radius: 10px;
    background: var(--sakura);
    color: white;
    font-weight: 500;
    -webkit-app-region: no-drag;
    letter-spacing: 0.5px;
  }

  .titlebar .title-input {
    flex: 1;
    border: none;
    background: transparent;
    font-size: 13px;
    font-weight: 500;
    color: var(--text-primary);
    outline: none;
    -webkit-app-region: no-drag;
    padding: 2px 4px;
    border-radius: 4px;
    min-width: 0;
  }

  .titlebar .title-input:focus {
    background: rgba(244, 114, 182, 0.08);
  }

  .titlebar .title-input::placeholder { color: var(--text-secondary); }

  .titlebar .btn {
    width: 28px; height: 28px;
    border: none;
    background: transparent;
    border-radius: 6px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 14px;
    color: var(--text-secondary);
    transition: all 0.2s;
    -webkit-app-region: no-drag;
    flex-shrink: 0;
  }

  .titlebar .btn:hover {
    background: rgba(244, 114, 182, 0.12);
    color: var(--sakura);
  }

  .titlebar .btn.active {
    background: var(--sakura);
    color: white;
  }

  .titlebar .btn-close:hover {
    background: #ef4444;
    color: white;
  }

  .titlebar .spacer { flex: 1; }

  /* Content area */
  .content {
    flex: 1;
    display: flex;
    flex-direction: column;
    padding: 12px 16px;
    overflow: hidden;
  }

  .content textarea {
    flex: 1;
    width: 100%;
    border: none;
    background: transparent;
    resize: none;
    font-size: 13px;
    line-height: 1.7;
    color: var(--text-primary);
    outline: none;
    font-family: inherit;
    -webkit-app-region: no-drag;
  }

  .content textarea::placeholder {
    color: var(--text-secondary);
    opacity: 0.6;
  }

  /* Mini mode */
  .mode-mini .content { padding: 10px 14px; }
  .mode-mini .content textarea {
    font-size: 12px;
    line-height: 1.5;
  }
  .mode-mini .titlebar { padding: 6px 10px; min-height: 34px; }

  /* Expanded mode */
  .mode-expanded .content textarea {
    font-size: 15px;
    line-height: 1.8;
  }

  /* Scrollbar */
  textarea::-webkit-scrollbar { width: 4px; }
  textarea::-webkit-scrollbar-track { background: transparent; }
  textarea::-webkit-scrollbar-thumb {
    background: rgba(244, 114, 182, 0.2);
    border-radius: 2px;
  }

  /* Resize handle */
  .resize-handle {
    position: absolute;
    bottom: 0; right: 0;
    width: 20px; height: 20px;
    cursor: nwse-resize;
  }

  /* Tag bar */
  .tag-bar {
    display: flex;
    gap: 4px;
    padding: 4px 12px;
    flex-wrap: wrap;
    min-height: 28px;
  }

  .tag-bar .tag {
    font-size: 10px;
    padding: 2px 8px;
    border-radius: 8px;
    background: rgba(244, 114, 182, 0.1);
    color: var(--sakura-dark);
    cursor: pointer;
  }
</style>
</head>
<body>
<div class="note-container" id="noteContainer">
  <div class="titlebar" id="titlebar">
    <span class="mode-badge" id="modeBadge">标准</span>
    <input class="title-input" id="titleInput" placeholder="无标题便签" maxlength="100">
    <div class="spacer"></div>
    <button class="btn" id="btnMini" title="迷你模式">⊟</button>
    <button class="btn" id="btnStandard" title="标准模式">⊞</button>
    <button class="btn" id="btnExpanded" title="展开模式">⬜</button>
    <button class="btn" id="btnPin" title="置顶">📌</button>
    <button class="btn btn-close" id="btnClose" title="关闭">✕</button>
  </div>
  <div class="tag-bar" id="tagBar"></div>
  <div class="content">
    <textarea id="editor" placeholder="开始写点什么..."></textarea>
  </div>
</div>

<script>
const noteId = window.sakura.getNoteId();
let currentMode = "standard";
let currentData = {};
let pinned = false;

const container = document.getElementById("noteContainer");
const editor = document.getElementById("editor");
const titleInput = document.getElementById("titleInput");
const modeBadge = document.getElementById("modeBadge");
const btnPin = document.getElementById("btnPin");

function setMode(mode) {
  currentMode = mode;
  container.classList.remove("mode-mini", "mode-expanded");
  if (mode === "mini") container.classList.add("mode-mini");
  if (mode === "expanded") container.classList.add("mode-expanded");

  const labels = { mini: "迷你", standard: "标准", expanded: "展开" };
  modeBadge.textContent = labels[mode];

  // Save mode
  if (noteId) {
    window.sakura.db.updateNote(noteId, { mode });
  }
}

document.getElementById("btnMini").onclick = () => setMode("mini");
document.getElementById("btnStandard").onclick = () => setMode("standard");
document.getElementById("btnExpanded").onclick = () => setMode("expanded");

// Pin toggle
btnPin.onclick = async () => {
  pinned = !pinned;
  btnPin.classList.toggle("active", pinned);
  await window.sakura.window.pin(pinned);
};

// Close
document.getElementById("btnClose").onclick = async () => {
  await saveNote();
  window.sakura.window.close();
};

// Auto-save with debounce
let saveTimer = null;
function debouncedSave() {
  clearTimeout(saveTimer);
  saveTimer = setTimeout(saveNote, 500);
}

async function saveNote() {
  if (!noteId) return;
  const data = {
    title: titleInput.value.trim(),
    content: editor.value,
  };
  await window.sakura.db.updateNote(noteId, data);
}

editor.addEventListener("input", debouncedSave);
titleInput.addEventListener("input", debouncedSave);

// Load note data
async function loadNote() {
  if (!noteId) return;

  // Listen for note:created from main process
  window.sakura.on("note:created", async (id) => {
    const note = await window.sakura.db.getNote(id);
    if (note) renderNote(note);
  });

  const note = await window.sakura.db.getNote(noteId);
  if (note) renderNote(note);
}

function renderNote(note) {
  currentData = note;
  titleInput.value = note.title || "";
  editor.value = note.content || "";
  pinned = note.pinned === 1;
  btnPin.classList.toggle("active", pinned);

  if (note.mode) setMode(note.mode);

  // Render tags
  if (note.tags) {
    const tagBar = document.getElementById("tagBar");
    tagBar.innerHTML = note.tags.split(",").filter(Boolean).map(t =>
      `<span class="tag">${t.trim()}</span>`
    ).join("");
  }
}

// Handle window blur - auto save
window.addEventListener("blur", saveNote);

loadNote();
</script>
</body>
</html>
