<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sakura Memo - Note</title>
<style>
  :root {
    --sakura: #F472B6;
    --sakura-dark: #BE185D;
    --glass-border: rgba(244, 114, 182, 0.2);
    --text-primary: #1a1a2e;
    --text-secondary: #6b7280;
    --radius: 14px;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    width: 100%; height: 100%; overflow: hidden;
    background: transparent;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
  }
  .note {
    width: 100%; height: 100%;
    background: rgba(255, 255, 255, 0.55);
    backdrop-filter: blur(24px);
    -webkit-backdrop-filter: blur(24px);
    border: 1px solid var(--glass-border);
    border-radius: var(--radius);
    display: flex; flex-direction: column;
    overflow: hidden;
    box-shadow: 0 8px 40px rgba(244,114,182,0.08);
  }
  .titlebar {
    display: flex; align-items: center;
    padding: 8px 12px;
    background: rgba(244,114,182,0.06);
    border-bottom: 1px solid var(--glass-border);
    gap: 6px;
  }
  .title-input {
    flex: 1; border: none; background: transparent;
    font-size: 13px; font-weight: 500; color: var(--text-primary);
    outline: none; padding: 2px 4px; border-radius: 4px;
  }
  .title-input:focus { background: rgba(244,114,182,0.06); }
  .title-input::placeholder { color: var(--text-secondary); }
  .btn {
    width: 28px; height: 28px; border: none;
    background: transparent; border-radius: 6px;
    cursor: pointer; font-size: 13px; color: var(--text-secondary);
    display: flex; align-items: center; justify-content: center;
    transition: all 0.15s; flex-shrink: 0;
  }
  .btn:hover { background: rgba(244,114,182,0.1); color: var(--sakura); }
  .btn.active { background: var(--sakura); color: white; }
  .btn-close:hover { background: #fecaca; color: #ef4444; }
  .content {
    flex: 1; padding: 12px 14px;
  }
  .content textarea {
    width: 100%; height: 100%; border: none;
    background: transparent; resize: none;
    font-size: 13px; line-height: 1.7;
    color: var(--text-primary); outline: none;
    font-family: inherit;
  }
  .content textarea::placeholder { color: var(--text-secondary); opacity: 0.5; }
  ::-webkit-scrollbar { width: 3px; }
  ::-webkit-scrollbar-thumb { background: rgba(244,114,182,0.15); border-radius: 2px; }
</style>
</head>
<body>
<div class="note">
  <div class="titlebar">
    <input class="title-input" id="titleInput" placeholder="无标题" maxlength="100">
    <button class="btn" id="btnPin" title="置顶">📌</button>
    <button class="btn btn-close" id="btnClose" title="关闭">✕</button>
  </div>
  <div class="content">
    <textarea id="editor" placeholder="开始写点什么..."></textarea>
  </div>
</div>

<script src="app.js"></script>
<script>
const noteId = sakura.getNoteId();
let pinned = false;
let saveTimer = null;

const titleInput = document.getElementById("titleInput");
const editor = document.getElementById("editor");
const btnPin = document.getElementById("btnPin");

function save() {
  if (!noteId) return;
  sakura.updateNote(noteId, {
    title: titleInput.value.trim(),
    content: editor.value,
    pinned: pinned ? 1 : 0
  });
}

function debounceSave() {
  clearTimeout(saveTimer);
  saveTimer = setTimeout(save, 500);
}

titleInput.addEventListener("input", debounceSave);
editor.addEventListener("input", debounceSave);

btnPin.onclick = () => {
  pinned = !pinned;
  btnPin.classList.toggle("active", pinned);
  save();
};

document.getElementById("btnClose").onclick = () => {
  save();
  window.close();
};

window.addEventListener("beforeunload", save);

// Load note data
(async () => {
  if (!noteId) return;
  const note = await sakura.getNote(noteId);
  if (note) {
    titleInput.value = note.title || "";
    editor.value = note.content || "";
    pinned = note.pinned === 1;
    btnPin.classList.toggle("active", pinned);
  }
})();
</script>
</body>
</html>
